  <text x="540" y="1125" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#f6eddb">GÓI TRỌN TỰ NHIÊN VÀO TỪNG TÁCH CÀ PHÊ</text>
  <text x="540" y="1175" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#dce8cf">Mang bã cà phê đến điểm thu gom của quán để cùng tạo thêm mảng xanh.</text>

  <text x="540" y="1295" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#a46032">#CaPheXanhSongLanh · Nội dung được hoàn thiện với sự hỗ trợ của AI</text>
