  <text x="540" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#a46032">CÀ PHÊ XANH · SỐNG LÀNH</text>
  <text x="540" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="64" font-weight="800" fill="#284f3d">VÒNG ĐỜI XANH</text>
